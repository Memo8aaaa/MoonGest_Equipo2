<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moon Beauty Space — Notificaciones</title>
  <link rel="stylesheet" href="styles.css">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brown-dark: #2d1f14;
  --brown-mid: #7a5535;
  --brown-main: #a07850;
  --brown-light: #c9a98a;
  --cream: #f9f5f0;
  --white: #ffffff;
  --border: #ede5dc;
  --text-main: #2d1f14;
  --text-muted: #9e8878;
  --text-hint: #b8a898;
  --badge-red-bg: #fdecea; --badge-red-text: #c0614e;
  --badge-yellow-bg: #fef3e2; --badge-yellow-text: #b07820;
  --badge-green-bg: #e8f5ee; --badge-green-text: #3a8a5c;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text-main);
  min-height: 100vh;
}

/* ── APP SHELL ── */
.app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 210px;
  background: var(--brown-dark);
  display: flex;
  flex-direction: column;
  padding: 24px 0;
  flex-shrink: 0;
  position: fixed;
  height: 100vh;
  top: 0; left: 0;
  z-index: 100;
}
.sidebar-logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo h2 {
  font-family: 'Cormorant Garamond', serif;
  color: #e8d5c0;
  font-size: 17px;
  font-weight: 300;
  line-height: 1.3;
}
.sidebar-logo p { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 1px; margin-top: 4px; }
.nav { flex: 1; padding: 16px 0; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
.nav-item.active { background: rgba(160,120,80,0.25); color: #e8c99a; border-left: 3px solid var(--brown-main); }
.nav-icon { font-size: 15px; width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
.sidebar-footer span { font-size: 11px; color: rgba(255,255,255,0.3); }
.btn-cerrar-sesion {
  display: flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,0.4); font-size: 12px;
  cursor: pointer; margin-top: 8px;
  background: none; border: none; font-family: 'DM Sans', sans-serif;
  padding: 0;
}
.btn-cerrar-sesion:hover { color: rgba(255,255,255,0.7); }

/* ── MAIN CONTENT ── */
.main { flex: 1; margin-left: 210px; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--white);
  padding: 18px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.topbar h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--text-main); font-weight: 400; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.content { flex: 1; padding: 28px 32px; }

/* ── BUTTONS ── */
.btn {
  padding: 9px 20px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.88; }
.btn-primary { background: var(--brown-main); color: #fff; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--brown-mid); }
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 6px; }
.btn-danger { background: #fdecea; color: #c0614e; border: 1.5px solid #f5c4c0; }

/* ── FORM FIELDS ── */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--brown-mid);
  letter-spacing: 1.4px;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e8ddd5;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-main);
  background: #fdf9f6;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brown-main); background: #fff; }
.field input::placeholder, .field textarea::placeholder { color: #c5b5a8; }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.field-row { display: flex; gap: 16px; }
.field-row .field { flex: 1; }

/* ── BADGES ── */
.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}
.badge-sin { background: var(--badge-red-bg); color: var(--badge-red-text); }
.badge-anticipo { background: var(--badge-yellow-bg); color: var(--badge-yellow-text); }
.badge-pagado { background: var(--badge-green-bg); color: var(--badge-green-text); }

/* ── CARDS ── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(45,31,20,0.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: 14px;
  padding: 28px 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 16px 60px rgba(0,0,0,0.15);
  animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from { transform: translateY(16px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--text-main); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-actions .btn { flex: 1; padding: 12px; }

/* ── ALERTS ── */
.alert {
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.alert-warning { background: #fef3e2; border: 1px solid #f5d9a0; color: #7a5010; }
.alert-error { background: var(--badge-red-bg); border: 1px solid #f5c4c0; color: #8a2010; }
.alert-success { background: var(--badge-green-bg); border: 1px solid #b0dfc0; color: #1a6040; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px;
  color: var(--text-hint);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── INFO BOX ── */
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 20px; }
.info-box { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
.info-box .ib-label { font-size: 10px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.info-box .ib-value { font-size: 14px; color: var(--text-main); font-weight: 500; }

  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>Moon Beauty<br>Space</h2><p>SISTEMA DE GESTIÓN</p></div>
    <nav class="nav">
      <a class="nav-item" href="citas.html"><span class="nav-icon">📅</span> Gestionar Citas</a>
      <a class="nav-item" href="clientas.html"><span class="nav-icon">👤</span> Clientas</a>
      <a class="nav-item" href="pagos.html"><span class="nav-icon">💳</span> Pagos</a>
      <a class="nav-item" href="reportes.html"><span class="nav-icon">📊</span> Reportes</a>
      <a class="nav-item active" href="notificaciones.html"><span class="nav-icon">🔔</span> Notificaciones</a>
      <a class="nav-item" href="catalogo.html"><span class="nav-icon">✂️</span> Catálogo</a>
    </nav>
    <div class="sidebar-footer"><span>Encargada · v2.0</span><button class="btn-cerrar-sesion" onclick="window.location.href='index.html'">↩ Cerrar sesión</button></div>
  </aside>
  <div class="main">
    <div class="topbar"><h1>Enviar Notificaciones</h1><button class="btn btn-primary btn-sm" onclick="document.getElementById('modal-politicas').classList.add('open')">Enviar Políticas del Salón</button></div>
    <div class="content" style="padding:28px 32px;overflow-y:auto">
      <div class="section-label">Recordatorios pendientes · Próximas 24 horas</div>
      <div id="notif-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-politicas">
  <div class="modal-box">
    <div class="modal-title">Enviar Políticas del Salón</div>
    <div class="modal-sub">Selecciona la clienta destinataria y edita el mensaje si necesitas</div>
    <div class="field"><label>Clienta destinataria</label><select><option>Sofía Martínez · 5551234567</option><option>Valentina Reyes · 5552345678</option><option>Camila Torres · 5553456789</option></select></div>
    <div class="field"><label>Mensaje (editable)</label><textarea style="min-height:140px">Hola! 🌙 Aquí las políticas de Moon Beauty Space:

• Anticipo de $100 requerido para apartar tu cita.
• Puntualidad: tolerancia de 10 minutos. Si llegas tarde el servicio puede reducirse.
• Cancelaciones con al menos 2 horas de anticipación.
• Acudir sin maquillaje en ojos, cremas ni aceites.
• El servicio se da por concluido cuando el pago está confirmado.

¡Gracias por tu preferencia! 💕</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="document.getElementById('modal-politicas').classList.remove('open')">Cancelar</button>
      <button class="btn btn-primary" onclick="alert('✅ Políticas enviadas por WhatsApp');document.getElementById('modal-politicas').classList.remove('open')">Enviar por WhatsApp</button>
    </div>
  </div>
</div>

<script>
  const recordatorios = [
    { clienta:'Valentina Reyes', servicio:'Retoque de pestañas', fecha:'16 mar 2026', hora:'10:00 AM', tel:'5552345678' },
    { clienta:'Andrea López', servicio:'Extensión de pestañas', fecha:'16 mar 2026', hora:'2:00 PM', tel:'5554567890' },
    { clienta:'Mariana García', servicio:'Diseño de cejas', fecha:'17 mar 2026', hora:'11:00 AM', tel:'5555678901' },
  ];
  document.getElementById('notif-list').innerHTML = recordatorios.map((r,i)=>`
    <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:20px">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500;color:var(--text-main)">${r.clienta}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px">${r.servicio} · ${r.fecha} · ${r.hora}</div>
        <div style="font-size:11px;color:var(--text-hint);margin-top:2px">📱 ${r.tel}</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="verMensaje(${i})">Ver mensaje</button>
      <button class="btn btn-primary btn-sm" onclick="enviar(${i})">Enviar recordatorio</button>
    </div>`).join('');

  function enviar(i) {
    const r = recordatorios[i];
    alert('✅ Recordatorio enviado a ' + r.clienta + ' por WhatsApp');
  }
  function verMensaje(i) {
    const r = recordatorios[i];
    alert(`Mensaje para ${r.clienta}:\n\nHola ${r.clienta.split(' ')[0]}! 🌙 Te recordamos tu cita en Moon Beauty Space:\n\n📅 ${r.fecha}\n⏰ ${r.hora}\n✂️ ${r.servicio}\n\nRecuerda llegar sin maquillaje en ojos. ¡Te esperamos! 💕`);
  }

  /* ─────────────────────────────────────────────────────────────
     SISTEMA DE EXPIRACIÓN DE SESIÓN POR INACTIVIDAD
     - Aviso emergente a los 25 minutos de inactividad
     - Cuenta regresiva de 60 segundos
     - Si presiona "Continuar sesión" → reinicia el contador a 25 min
     - Si presiona "Cerrar sesión" o se agota el tiempo → redirige al login
  ───────────────────────────────────────────────────────────── */
  const SESSION_TIMEOUT  = 25 * 60 * 1000;  // 25 minutos
  const WARNING_BEFORE   = 1 * 60 * 1000;  // aviso 1 min antes (al min 1)

  let _inactivityTimer, _warningTimer, _countdownInterval;

  let _warningVisible = false;

  function resetTimers() {
    // Si el aviso ya está visible, NO reiniciar — esperar decisión de la encargada
    if (_warningVisible) return;

    clearTimeout(_inactivityTimer);
    clearTimeout(_warningTimer);
    clearInterval(_countdownInterval);

    // Programar aviso al minuto 1
    _warningTimer = setTimeout(showSessionWarning, SESSION_TIMEOUT - WARNING_BEFORE);

    // Programar cierre automático al minuto 2
    _inactivityTimer = setTimeout(expireSession, SESSION_TIMEOUT);
  }

  function showSessionWarning() {
    _warningVisible = true;  // Bloquear reinicio por actividad
    let secsLeft = 60;
    document.getElementById('session-countdown').textContent = secsLeft;
    document.getElementById('session-overlay').classList.add('open');

    _countdownInterval = setInterval(() => {
      secsLeft--;
      document.getElementById('session-countdown').textContent = secsLeft;
      if (secsLeft <= 0) clearInterval(_countdownInterval);
    }, 1000);
  }

  function continuarSesion() {
    _warningVisible = false;  // Permitir de nuevo el reinicio por actividad
    resetTimers();
  }

  function expireSession() {
    clearTimeout(_inactivityTimer);
    clearTimeout(_warningTimer);
    clearInterval(_countdownInterval);
    _warningVisible = false;
    document.getElementById('session-overlay').classList.remove('open');
    window.location.href = 'index.html?sesion=expirada';
  }

  // Reiniciar timers ante cualquier interacción del usuario
  // (no tiene efecto si el aviso está visible gracias a _warningVisible)
  ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach(evt =>
    document.addEventListener(evt, resetTimers, { passive: true })
  );

  // Arrancar al cargar la página
  resetTimers();
</script>
</body>
</html>
